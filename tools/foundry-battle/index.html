  /* ===== 兵器工場争奪戦シミュレータ専用 ===== */
  .fb-layout{display:grid;grid-template-columns:minmax(0,1fr) 332px;gap:16px;align-items:start}

  /* ツールバー */
  .fb-bar{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin:0 0 12px}
  .fb-grp{display:flex;gap:5px;align-items:center;background:var(--panel);border:1px solid var(--line);
    border-radius:11px;padding:5px 7px;box-shadow:var(--card-sh)}
  .fb-grp .lbl{font-size:10.5px;color:var(--muted);font-weight:700;margin-right:2px}
  .fb-b{font:inherit;font-size:12px;font-weight:700;border:1px solid var(--line);background:#fff;color:var(--text);
    border-radius:8px;padding:6px 10px;cursor:pointer;transition:border-color .12s,background .12s;white-space:nowrap;
    display:inline-flex;align-items:center;gap:5px;line-height:1}
  .fb-b:hover{border-color:var(--frost)}
  .fb-b:disabled{opacity:.4;cursor:not-allowed}
  .fb-b.blue{border-color:#bcd2f7;color:#1f57c4}
  .fb-b.blue:hover{background:#eef4ff}
  .fb-b.red{border-color:#f5c2bc;color:#c4382b}
  .fb-b.red:hover{background:#fff0ee}
  .fb-b.on{background:var(--frost);border-color:var(--frost);color:#fff}
  .fb-b svg{width:15px;height:15px}
  .fb-ic{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

  /* マップ */
  .fb-mapwrap{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:16px;
    overflow:hidden;box-shadow:var(--card-sh);touch-action:none}
  #fbMap{display:block;width:100%;height:auto;aspect-ratio:1000/720;cursor:grab;user-select:none}
  #fbMap.drag{cursor:grabbing}
  .fb-zoom{position:absolute;right:10px;bottom:10px;display:flex;flex-direction:column;gap:5px}
  .fb-zoom button{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:rgba(255,255,255,.94);
    color:var(--text);font-size:17px;font-weight:800;cursor:pointer;display:grid;place-items:center;box-shadow:0 2px 6px rgba(30,35,60,.1)}
  .fb-zoom button:hover{border-color:var(--frost);color:var(--frost)}
  .fb-clock{position:absolute;left:10px;top:10px;background:rgba(21,22,27,.86);color:#fff;border-radius:10px;
    padding:6px 11px;font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:9px}
  .fb-clock .ph{font-size:10px;font-weight:700;color:#ffb27a;background:rgba(255,122,47,.18);border-radius:5px;padding:1px 6px}

  /* 施設ノード */
  .fac{cursor:pointer}
  .fac:focus{outline:none}
  .fac .pad{transition:fill .15s,stroke .15s}
  .fac .badge{transition:fill .15s}
  .fac:focus-visible .pad{stroke:var(--frost)!important;stroke-width:4}
  .fac .lbl{font-family:'Noto Sans JP',sans-serif}
  .fac.dim{opacity:.22;pointer-events:none}
  .cap-ring.spin{animation:fbspin 1.1s linear infinite;transform-origin:center}
  @keyframes fbspin{from{transform:rotate(-90deg)}to{transform:rotate(270deg)}}
  @media(prefers-reduced-motion:reduce){.cap-ring.spin{animation:none}}
  .fb-frow.lk{opacity:.55}
  .fb-frow.lk .fn{color:var(--muted)}

  /* ツールチップ */
  .fb-tip{position:absolute;z-index:20;pointer-events:none;max-width:248px;background:#15161b;color:#e9ebf2;
    border-radius:11px;padding:11px 13px;font-size:12px;line-height:1.7;box-shadow:0 10px 30px rgba(10,12,24,.4);
    opacity:0;transform:translateY(4px);transition:opacity .12s,transform .12s}
  .fb-tip.show{opacity:1;transform:translateY(0)}
  .fb-tip h4{font-size:13px;font-weight:800;margin:0 0 5px;display:flex;align-items:center;gap:7px}
  .fb-tip .ty{font-size:10px;font-weight:700;color:#9aa3c0;background:rgba(255,255,255,.08);border-radius:5px;padding:1px 6px}
  .fb-tip .row{display:flex;justify-content:space-between;gap:10px;color:#c4c9d8}
  .fb-tip .row b{color:#fff;font-weight:700}
  .fb-tip .ownr{margin-top:6px;font-weight:800}
  .fb-tip .buff{margin-top:5px;color:#ffd2a8}
  .fb-tip .hint{margin-top:7px;font-size:10.5px;color:#7e889c;border-top:1px solid rgba(255,255,255,.08);padding-top:5px}

  /* サイドパネル */
  .fb-side{display:flex;flex-direction:column;gap:12px}
  .fb-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px 14px;box-shadow:var(--card-sh)}
  .fb-card h3{margin:0 0 9px;font-size:12.5px;color:var(--text);border:none;padding:0;display:flex;align-items:center;gap:7px}
  .fb-card h3 .c{font-size:10px;color:var(--muted);font-weight:600;margin-left:auto}
  .fb-score{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .fb-team{border-radius:11px;padding:10px;color:#fff;position:relative;overflow:hidden}
  .fb-team.blue{background:linear-gradient(150deg,#3a7bf0,#2256c8)}
  .fb-team.red{background:linear-gradient(150deg,#ef5d4a,#cf2e22)}
  .fb-team .nm{font-size:11px;font-weight:800;opacity:.92;display:flex;align-items:center;gap:5px}
  .fb-team .pt{font-size:23px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1.15;letter-spacing:-.5px}
  .fb-team .sub{font-size:10.5px;opacity:.9;font-variant-numeric:tabular-nums}
  .fb-team .cnt{position:absolute;right:9px;top:9px;font-size:10px;font-weight:800;background:rgba(255,255,255,.2);border-radius:6px;padding:1px 6px}
  .fb-lead{margin-top:9px;font-size:11px;text-align:center;font-weight:700;color:var(--muted)}
  .fb-buffs{display:flex;flex-direction:column;gap:6px}
  .fb-buff{display:flex;align-items:center;gap:8px;font-size:11.5px}
  .fb-buff .k{color:var(--muted);min-width:104px}
  .fb-buff .bv{font-weight:800;font-variant-numeric:tabular-nums;display:flex;gap:9px;margin-left:auto}
  .fb-buff .bb{color:#2256c8}.fb-buff .br{color:#cf2e22}
  .fb-buff.dbf .k{color:#b4521a}

  /* 施設リスト */
  .fb-flist{display:flex;flex-direction:column;gap:4px;max-height:none}
  .fb-frow{display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid var(--line);border-radius:9px;
    cursor:pointer;background:#fff;transition:border-color .12s}
  .fb-frow:hover{border-color:var(--frost)}
  .fb-frow.b{background:#eff5ff;border-color:#cfe0fb}
  .fb-frow.r{background:#fff1ef;border-color:#f7d2cc}
  .fb-frow .dot{width:11px;height:11px;border-radius:50%;flex:none;border:2px solid #fff;box-shadow:0 0 0 1px var(--line)}
  .fb-frow .fn{font-size:11.5px;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fb-frow .fp{font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums}

  /* 凡例 */
  .fb-leg{display:flex;flex-wrap:wrap;gap:9px;font-size:11px;color:var(--muted)}
  .fb-leg span{display:inline-flex;align-items:center;gap:5px}
  .fb-leg .sw{width:13px;height:13px;border-radius:50%;border:2px solid}
  .fb-leg .sw.b{border-color:#2256c8;background:#cfe0fb}
  .fb-leg .sw.r{border-color:#cf2e22;background:#f7d2cc;border-style:dashed}
  .fb-leg .sw.n{border-color:#9aa3b5;background:#eef0f5;border-style:dotted}
  .fb-shapes{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;font-size:10.5px;color:var(--muted)}
  .fb-shapes span{display:inline-flex;align-items:center;gap:4px}

  /* フィルタ chips */
  .fb-filt{display:flex;flex-wrap:wrap;gap:5px}
  .fb-chip{font-size:11px;font-weight:700;border:1px solid var(--line);background:#fff;color:var(--muted);
    border-radius:999px;padding:4px 11px;cursor:pointer;transition:.12s}
  .fb-chip.on{background:var(--frost);border-color:var(--frost);color:#fff}

  /* セーブ */
  .fb-saverow{display:flex;gap:6px;margin-bottom:8px}
  .fb-saverow input{flex:1;min-width:0;font:inherit;font-size:12px;border:1px solid var(--line);border-radius:8px;padding:7px 9px}
  .fb-scen{display:flex;align-items:center;gap:7px;font-size:11.5px;padding:5px 8px;border:1px solid var(--line);border-radius:8px;margin-bottom:4px}
  .fb-scen .sn{flex:1;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fb-scen button{font-size:11px;border:none;background:none;cursor:pointer;color:var(--frost);font-weight:700;padding:2px 4px}
  .fb-scen button.del{color:var(--bad)}
  .fb-empty{font-size:11px;color:var(--muted);text-align:center;padding:6px}

  .fb-helpgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  @media(max-width:560px){.fb-helpgrid{grid-template-columns:1fr}}
  .fb-help{font-size:12px;border:1px solid var(--line);border-radius:10px;padding:11px 12px;background:#fff}
  .fb-help b{color:var(--frost)}
  .fb-tag{display:inline-block;font-size:10px;border:1px solid var(--frost);color:var(--frost);border-radius:5px;padding:1px 7px;margin-bottom:8px}
  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
  .fb-toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(12px);background:#15161b;color:#fff;
    font-size:12.5px;font-weight:700;padding:10px 18px;border-radius:10px;box-shadow:0 8px 24px rgba(10,12,24,.35);
    opacity:0;transition:.2s;z-index:60;pointer-events:none}
  .fb-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ===== 横棒スコアバー(つばぜり合い) ===== */
  .fb-scorebar{margin:0 0 14px}
  .fb-sb-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:5px;font-variant-numeric:tabular-nums}
  .fb-sb-top .s{font-weight:900;font-size:19px;letter-spacing:-.5px}
  .fb-sb-top .s.b{color:#2256c8}.fb-sb-top .s.r{color:#cf2e22}
  .fb-sb-top .s small{font-size:11px;font-weight:700;color:var(--muted);margin-left:5px}
  .fb-sb-track{position:relative;height:30px;border-radius:9px;overflow:hidden;background:#eef0f5;
    border:1px solid var(--line);box-shadow:inset 0 1px 3px rgba(20,30,60,.08)}
  .fb-sb-blue{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,#3a7bf0,#2256c8);transition:width .5s cubic-bezier(.22,1,.36,1)}
  .fb-sb-red{position:absolute;right:0;top:0;bottom:0;background:linear-gradient(90deg,#cf2e22,#ef5d4a);transition:width .5s cubic-bezier(.22,1,.36,1)}
  .fb-sb-edge{position:absolute;top:0;bottom:0;width:3px;background:#fff;transform:translateX(-1.5px);transition:left .5s cubic-bezier(.22,1,.36,1);
    box-shadow:0 0 7px rgba(255,255,255,.9)}
  .fb-clash{position:absolute;top:50%;transform:translate(-50%,-50%);font-size:14px;pointer-events:none;
    transition:left .5s cubic-bezier(.22,1,.36,1);filter:drop-shadow(0 0 4px rgba(255,200,60,.9))}
  .fb-clash.spark{animation:fbclash 1.1s ease-in-out infinite}
  @keyframes fbclash{0%,100%{transform:translate(-50%,-50%) scale(1) rotate(-8deg)}50%{transform:translate(-50%,-50%) scale(1.22) rotate(8deg)}}
  .fb-sb-arrow{position:absolute;top:-24px;transform:translateX(-50%);transition:left .5s cubic-bezier(.22,1,.36,1);
    font-size:11px;font-weight:900;white-space:nowrap;display:flex;align-items:center;gap:3px;font-variant-numeric:tabular-nums}
  .fb-sb-arrow.b{color:#2256c8}.fb-sb-arrow.r{color:#cf2e22}
  .fb-sb-arrow .ar{font-size:15px}
  .fb-sb-even{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:800;color:var(--muted)}
  @media(prefers-reduced-motion:reduce){.fb-clash.spark{animation:none}}

  /* ブラシ(配置勢力)選択 */
  .fb-brush{display:flex;gap:4px}
  .fb-brush button{font:inherit;font-size:12px;font-weight:800;border:1.5px solid var(--line);background:#fff;color:var(--muted);
    border-radius:8px;padding:6px 11px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .fb-brush button .d{width:10px;height:10px;border-radius:50%}
  .fb-brush button.on.b{border-color:#2256c8;background:#eef4ff;color:#1f57c4}
  .fb-brush button.on.r{border-color:#cf2e22;background:#fff0ee;color:#c4382b}
  .fb-brush button.on.n{border-color:#5b6276;background:#eef0f5;color:#23283a}

  /* ロック・キャプチャ・番号 */
  .fac.locked{opacity:.42;cursor:not-allowed}
  .fac .lock{pointer-events:none}
  .fac .num{font-family:'Outfit',sans-serif;font-weight:900;fill:#fff;text-anchor:middle;pointer-events:none}
  .cap-ring{fill:none;stroke-width:4;stroke-linecap:round;transform:rotate(-90deg)}

  /* 設定・一時退出カード */
  .fb-set{display:flex;flex-direction:column;gap:7px}
  .fb-set label{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:11.5px;color:var(--muted)}
  .fb-set input{width:74px;font:inherit;font-size:12px;text-align:right;border:1px solid var(--line);border-radius:7px;padding:5px 7px;font-variant-numeric:tabular-nums}
  .fb-exit{display:flex;flex-direction:column;gap:8px}
  .fb-exit .st{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700}
  .fb-exit .st .pin{width:10px;height:10px;border-radius:50%}
  .fb-exit .big{font-size:20px;font-weight:900;font-variant-numeric:tabular-nums}
  .fb-exit button{font:inherit;font-size:12.5px;font-weight:800;border:none;border-radius:9px;padding:9px;cursor:pointer;color:#fff;background:var(--frost)}
  .fb-exit button.re{background:#2256c8}
  .fb-exit button:disabled{opacity:.45;cursor:not-allowed}

  /* イベント時間タイムライン */
  .fb-timeline{position:relative;height:8px;background:#eef0f5;border-radius:5px;margin:9px 0 4px;border:1px solid var(--line)}
  .fb-timeline .pf{position:absolute;top:-3px;width:2px;height:14px;background:#c0c6d4}
  .fb-timeline .pl{position:absolute;top:11px;font-size:9px;color:var(--muted);transform:translateX(-50%);white-space:nowrap}
  .fb-timeline .now{position:absolute;top:0;bottom:0;left:0;background:linear-gradient(90deg,#ffb27a,#ff7a2f);border-radius:5px 0 0 5px}
</style>
